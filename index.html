<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        /* --- TAMBAHAN CSS UNTUK LOGO DAN TAJUK --- */
        #header-container {
            position: absolute;
            top: 10px;
            left: 50px; /* Jarak dari kiri supaya tidak bertindih dengan butang zoom */
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border: 2px solid #333;
        }

        #logo-puo {
            height: 60px; /* Saiz logo */
            margin-right: 15px;
        }

        #title-text {
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #333;
        }

        #title-text h2 {
            margin: 0;
            font-size: 18px;
            text-transform: uppercase;
        }

        #title-text p {
            margin: 0;
            font-size: 12px;
            font-weight: bold;
        }
        /* ---------------------------------------- */
        </style>
        <title>Peta Taman Perumahan - PUO</title>
    </head>
    <body>
        
        <div id="header-container">
            <img id="logo-puo" src="https://upload.wikimedia.org/wikipedia/ms/thumb/0/02/Politeknik_Ungku_Omar_logo.png/220px-Politeknik_Ungku_Omar_logo.png" alt="Logo PUO">
            <div id="title-text">
                <h2>TAMAN PERUMAHAN</h2>
                <p>Politeknik Ungku Omar</p>
            </div>
        </div>
        <div id="map">
        </div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/lotfinalpolygonice_1.js"></script>
        <script src="data/BATUSEMPADAN_2.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;
            highlightLayer.openPopup();
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[2.1026374347359114,102.52091717362578],[2.1051311254238736,102.52503551731698]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);

        var bounds_group = new L.featureGroup([]);
        function setBounds() {}

        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        map.addLayer(layer_GoogleSatellite_0);

        function pop_lotfinalpolygonice_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['fid'] !== null ? autolinker.link(String(feature.properties['fid']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2"><strong>NO_LOT</strong><br />' + (feature.properties['NO_LOT'] !== null ? autolinker.link(String(feature.properties['NO_LOT']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['AREA'] !== null ? autolinker.link(String(feature.properties['AREA']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['tsp — hakmilik_DAERAH'] !== null ? autolinker.link(String(feature.properties['tsp — hakmilik_DAERAH']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['tsp — hakmilik_NO.PA'] !== null ? autolinker.link(String(feature.properties['tsp — hakmilik_NO.PA']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['tsp — pemilik_PEMILIK'] !== null ? autolinker.link(String(feature.properties['tsp — pemilik_PEMILIK']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) {
                addClassToPopupIfMedia(content, e.popup);
            });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_lotfinalpolygonice_1_0() {
            return {
                pane: 'pane_lotfinalpolygonice_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(225,89,137,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_lotfinalpolygonice_1');
        map.getPane('pane_lotfinalpolygonice_1').style.zIndex = 401;
        
        var layer_lotfinalpolygonice_1 = new L.geoJson(json_lotfinalpolygonice_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_lotfinalpolygonice_1',
            layerName: 'layer_lotfinalpolygonice_1',
            pane: 'pane_lotfinalpolygonice_1',
            onEachFeature: pop_lotfinalpolygonice_1,
            style: style_lotfinalpolygonice_1_0,
        });
        bounds_group.addLayer(layer_lotfinalpolygonice_1);
        map.addLayer(layer_lotfinalpolygonice_1);

        function pop_BATUSEMPADAN_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr><td colspan="2">' + (feature.properties['fid'] !== null ? autolinker.link(String(feature.properties['fid'])) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['X'] !== null ? autolinker.link(String(feature.properties['X'])) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['Y'] !== null ? autolinker.link(String(feature.properties['Y'])) : '') + '</td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) {
                addClassToPopupIfMedia(content, e.popup);
            });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_BATUSEMPADAN_2_0() {
            return {
                pane: 'pane_BATUSEMPADAN_2',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(1,200,255,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_BATUSEMPADAN_2');
        map.getPane('pane_BATUSEMPADAN_2').style.zIndex = 402;
        var layer_BATUSEMPADAN_2 = new L.geoJson(json_BATUSEMPADAN_2, {
            pane: 'pane_BATUSEMPADAN_2',
            onEachFeature: pop_BATUSEMPADAN_2,
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, style_BATUSEMPADAN_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_BATUSEMPADAN_2);
        map.addLayer(layer_BATUSEMPADAN_2);

        // Labels
        var i = 0;
        var totalMarkers = 0;
        var labels = [];
        layer_lotfinalpolygonice_1.eachLayer(function(layer) {
            var labelContent = (layer.feature.properties['NO_LOT'] !== null?String('<div style="color: #323232; font-size: 10pt; font-family: \'Arial\', sans-serif;">' + layer.feature.properties['NO_LOT']) + '</div>':'');
            layer.bindTooltip(labelContent, {permanent: true, offset: [-0, -16], className: 'css_lotfinalpolygonice_1'});
            labels.push(layer);
            i++;
        });

        // Search Control
        map.addControl(new L.Control.Search({
            layer: layer_lotfinalpolygonice_1,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'NO_LOT'}));
        
        document.getElementsByClassName('search-button')[0].className += ' fa fa-binoculars';

        resetLabels([layer_lotfinalpolygonice_1]);
        map.on("zoomend", function(){ resetLabels([layer_lotfinalpolygonice_1]); });
        </script>        
    </body>
</html>
