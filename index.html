<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        /* --- STYLING LOGO & TAJUK --- */
        #logo-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: white;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 2px solid #ed1c24;
        }

        #logo-poli {
            height: 70px; /* Saiz logo */
            display: block;
        }

        #title-container {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 35px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 2px solid #ed1c24;
            text-align: center;
            min-width: 300px;
        }

        #title-main {
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            color: #ed1c24;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Supaya butang zoom tak langgar logo */
        .leaflet-top.leaflet-left {
            top: 120px !important;
        }
        </style>
        <title>Peta Taman Perumahan</title>
    </head>
    <body>
        
        <div id="logo-container">
            <img id="logo-poli" src="https://upload.wikimedia.org/wikipedia/ms/thumb/0/02/Politeknik_Ungku_Omar_logo.png/220px-Politeknik_Ungku_Omar_logo.png" alt="Logo Poli">
        </div>

        <div id="title-container">
            <h1 id="title-main">TAMAN PERUMAHAN</h1>
        </div>

        <div id="map"></div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/lotfinalpolygonice_1.js"></script>
        <script src="data/BATUSEMPADAN_2.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;
            highlightLayer.openPopup();
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[2.1026374347359114,102.52091717362578],[2.1051311254238736,102.52503551731698]]);
        
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('qgis2web &middot; Leaflet &middot; QGIS');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        var zoomControl = L.control.zoom({ position: 'topleft' }).addTo(map);

        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            maxZoom: 28,
        });
        map.addLayer(layer_GoogleSatellite_0);

        function pop_lotfinalpolygonice_1(feature, layer) {
            layer.on({ mouseover: highlightFeature });
            var popupContent = '<table>\
                    <tr><td colspan="2"><strong>NO_LOT</strong><br />' + (feature.properties['NO_LOT'] !== null ? autolinker.link(String(feature.properties['NO_LOT'])) : '') + '</td></tr>\
                    <tr><td colspan="2">AREA: ' + (feature.properties['AREA'] !== null ? autolinker.link(String(feature.properties['AREA'])) : '') + '</td></tr>\
                </table>';
            layer.bindPopup(removeEmptyRowsFromPopupContent(popupContent, feature), { maxHeight: 400 });
        }

        function style_lotfinalpolygonice_1_0() {
            return {
                pane: 'pane_lotfinalpolygonice_1',
                color: 'rgba(35,35,35,1.0)',
                weight: 1.0, 
                fill: true,
                fillOpacity: 0.6,
                fillColor: 'rgba(225,89,137,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_lotfinalpolygonice_1');
        map.getPane('pane_lotfinalpolygonice_1').style.zIndex = 401;
        
        var layer_lotfinalpolygonice_1 = new L.geoJson(json_lotfinalpolygonice_1, {
            pane: 'pane_lotfinalpolygonice_1',
            onEachFeature: pop_lotfinalpolygonice_1,
            style: style_lotfinalpolygonice_1_0,
        });
        map.addLayer(layer_lotfinalpolygonice_1);

        // Labels Lot
        layer_lotfinalpolygonice_1.eachLayer(function(layer) {
            var label = (layer.feature.properties['NO_LOT'] !== null?String(layer.feature.properties['NO_LOT']):'');
            layer.bindTooltip(label, {permanent: true, direction: 'center', className: 'css_lot_label'});
        });

        // Search
        map.addControl(new L.Control.Search({
            layer: layer_lotfinalpolygonice_1,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'NO_LOT'}));
        </script>        
    </body>
</html>
